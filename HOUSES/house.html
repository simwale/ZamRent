    }

        padding:40px 20px;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
     apiKey: "AIzaSyB_GeKHvHWF4OnCjl4n1RlIAJfIqH69rHo",
  authDomain: "zamrent-4b4de.firebaseapp.com",
  projectId: "zamrent-4b4de",
  storageBucket: "zamrent-4b4de.firebasestorage.app",
  messagingSenderId: "1027188717383",
  appId: "1:1027188717383:web:0c247922d40ca7a35dbe62"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("housesContainer");

async function loadHouses() {
  const querySnapshot = await getDocs(collection(db, "houses"));

  container.innerHTML = ""; // clear old content

  querySnapshot.forEach((doc) => {
    const house = doc.data();

    const houseCard = document.createElement("div");
    houseCard.classList.add("card");

    houseCard.innerHTML = `
      <img src="${house.imageURL}">
      <div class="card-content">
        <div class="price">K${house.price}/month</div>
        <p>${house.title} - ${house.location}</p>

        <a href="#" class="btn">View Details</a>

        <a href="https://wa.me/${house.whatsapp || '260000000000'}?text=Hello I am interested in your house"
           class="btn whatsapp">
           Chat on WhatsApp
        </a>
      </div>
    `;

    container.appendChild(houseCard);
  });
}

loadHouses();
</script>
