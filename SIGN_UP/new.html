<form onsubmit="signUp(event)">
  <input type="text" id="username" placeholder="Username" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>

  <label>Select Role:</label>
  <select id="role" required>
    <option value="">--Choose Role--</option>
    <option value="landlord">Landlord</option>
    <option value="agent">Agent</option>
    <option value="client">Client</option>
  </select>

  <label class="checkbox">
    <input type="checkbox" required>
    I agree to the terms
  </label>

  <button type="submit">Register</button>
</form>

  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<!-- SCRIPT -->
<script>
const toggleBtn = document.getElementById("menu-toggle");
const sidebar = document.getElementById("sidebar");
const closeBtn = document.getElementById("close-btn");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.add("active");
});

closeBtn.addEventListener("click", () => {
  sidebar.classList.remove("active");
});
</script>
<!--FIREBASE-->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
   apiKey: "AIzaSyB_GeKHvHWF4OnCjl4n1RlIAJfIqH69rHo",
  authDomain: "zamrent-4b4de.firebaseapp.com",
  projectId: "zamrent-4b4de",
  storageBucket: "zamrent-4b4de.firebasestorage.app",
  messagingSenderId: "1027188717383",
  appId: "1:1027188717383:web:0c247922d40ca7a35dbe62"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGNUP FUNCTION
window.signUp = async function (e) {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Save extra user data in Firestore
    await setDoc(doc(db, "users", user.uid), {
      username: username,
      email: email,
      role: role
    });

    alert("Account created successfully!");

    // Redirect to login
    window.location.href = "login.html";

  } catch (error) {
    alert(error.message);
  }
};
</script>
